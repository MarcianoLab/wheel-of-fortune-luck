<style>
  #wof-experiment,
  #wof-experiment * {
    box-sizing: border-box;
  }

  #wof-experiment {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #ffffff;
    color: #0f172a;
    font-family: Arial, Helvetica, sans-serif;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  }

  #wof-experiment button {
    font-family: inherit;
  }

  .wof-header {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
  }

  .wof-title {
    margin: 0;
    font-size: 24px;
    line-height: 1.2;
    font-weight: 700;
    color: #020617;
  }

  #wof-condition-label {
    margin: 6px 0 0;
    font-size: 14px;
    line-height: 1.5;
    color: #475569;
  }

  .wof-stats {
    display: grid;
    grid-template-columns: minmax(90px, 1fr);
    gap: 10px;
    min-width: 160px;
  }

  .wof-stat {
    padding: 10px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: #ffffff;
  }

  .wof-stat-label {
    margin-bottom: 4px;
    color: #64748b;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .wof-stat-value {
    color: #020617;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
  }

  .wof-progress {
    height: 8px;
    margin-bottom: 26px;
    overflow: hidden;
    border-radius: 999px;
    background: #f1f5f9;
  }

  #wof-progress-bar {
    width: 0;
    height: 100%;
    border-radius: 999px;
    background: #16a34a;
    transition: width 300ms ease;
  }

  .wof-main {
    display: grid;
    grid-template-columns: minmax(320px, 1fr) 280px;
    align-items: center;
    gap: 32px;
  }

  .wof-wheel-wrap {
    display: flex;
    justify-content: center;
  }

  .wof-wheel-stage {
    position: relative;
    width: min(72vw, 360px);
    height: min(72vw, 360px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wof-pointer-wrap {
    position: absolute;
    top: -8px;
    left: 0;
    z-index: 20;
    display: flex;
    width: 100%;
    justify-content: center;
  }

  .wof-pointer {
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 34px solid #111827;
    filter: drop-shadow(0 4px 4px rgba(15, 23, 42, 0.24));
  }

  #wof-wheel {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border: 8px solid #ffffff;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #16a34a 0deg 288deg, #dc2626 288deg 360deg);
    box-shadow: 0 18px 28px rgba(15, 23, 42, 0.16);
    outline: 1px solid #e2e8f0;
    transition: transform 3200ms cubic-bezier(0.12, 0.68, 0.1, 1);
  }

  .wof-wheel-hub {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 3;
    width: 80px;
    height: 80px;
    transform: translate(-50%, -50%);
    border: 1px solid #e2e8f0;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: inset 0 2px 8px rgba(15, 23, 42, 0.08);
  }

  .wof-controls {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  #wof-bet-panel {
    padding: 16px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: #ffffff;
  }

  #wof-bet-panel.is-hidden {
    display: none;
  }

  #wof-assigned-wager {
    display: none;
    padding: 16px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: #ffffff;
    color: #334155;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.45;
  }

  #wof-assigned-wager.is-visible {
    display: block;
  }

  #wof-payoff-panel {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 14px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: #f8fafc;
  }

  .wof-payoff-item {
    flex: 1;
    padding: 10px 8px;
    border-radius: 6px;
    background: #ffffff;
    text-align: center;
  }

  .wof-payoff-label {
    display: block;
    margin-bottom: 3px;
    color: #64748b;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .wof-payoff-value {
    color: #020617;
    font-size: 16px;
    font-weight: 800;
    line-height: 1.25;
  }

  #wof-payoff-win {
    color: #15803d;
  }

  #wof-payoff-loss {
    color: #b91c1c;
  }

  .wof-panel-title {
    margin-bottom: 12px;
    color: #334155;
    font-size: 14px;
    font-weight: 700;
  }

  #wof-bet-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .wof-bet-button,
  .wof-rating-button {
    min-height: 42px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    background: #ffffff;
    color: #1e293b;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
  }

  .wof-bet-button:hover,
  .wof-rating-button:hover {
    border-color: #16a34a;
    background: #f0fdf4;
  }

  .wof-bet-button:disabled,
  #wof-spin-button:disabled,
  #wof-next-button:disabled {
    cursor: not-allowed;
    opacity: 0.55;
  }

  .wof-bet-button.is-active {
    border-color: #16a34a;
    background: #f0fdf4;
    color: #166534;
  }

  #wof-spin-button {
    width: 100%;
    min-height: 50px;
    border: 0;
    border-radius: 6px;
    background: #020617;
    color: #ffffff;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: background 160ms ease, opacity 160ms ease;
  }

  #wof-spin-button:hover:not(:disabled) {
    background: #1e293b;
  }

  #wof-status {
    min-height: 24px;
    color: #475569;
    font-size: 14px;
    line-height: 1.5;
  }

  #wof-modal {
    position: fixed;
    inset: 0;
    z-index: 999999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(4px);
  }

  #wof-modal.is-open {
    display: flex;
  }

  .wof-modal-panel {
    width: 100%;
    max-width: 620px;
    padding: 22px;
    border-radius: 8px;
    background: #ffffff;
    box-shadow: 0 24px 48px rgba(15, 23, 42, 0.26);
  }

  #wof-modal-title {
    color: #020617;
    font-size: 24px;
    font-weight: 800;
    line-height: 1.3;
    text-align: center;
  }

  #wof-modal-title.is-win {
    color: #15803d;
  }

  #wof-modal-title.is-loss {
    color: #b91c1c;
  }

  #wof-modal-message {
    margin-top: 8px;
    color: #334155;
    font-size: 15px;
    line-height: 1.6;
  }

  #wof-modal-message:empty {
    display: none;
  }

  #wof-rating-buttons {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 8px;
    margin-top: 20px;
  }

  .wof-scale-labels {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    margin-top: 6px;
    color: #64748b;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.25;
  }

  .wof-scale-low {
    grid-column: 1 / span 3;
    text-align: left;
  }

  .wof-scale-high {
    grid-column: 8 / span 3;
    text-align: right;
  }

  .wof-rating-button.is-active {
    border-color: #16a34a;
    background: #16a34a;
    color: #ffffff;
  }

  #wof-next-button {
    width: 100%;
    min-height: 48px;
    margin-top: 20px;
    border: 0;
    border-radius: 6px;
    background: #16a34a;
    color: #ffffff;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }

  #wof-next-button:hover:not(:disabled) {
    background: #15803d;
  }

  @media (max-width: 760px) {
    #wof-experiment {
      padding: 16px;
    }

    .wof-header {
      flex-direction: column;
    }

    .wof-stats {
      min-width: 0;
      grid-template-columns: repeat(3, 1fr);
    }

    .wof-main {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 480px) {
    .wof-stats {
      grid-template-columns: 1fr;
    }

    .wof-wheel-stage {
      width: min(86vw, 330px);
      height: min(86vw, 330px);
    }

    #wof-rating-buttons {
      gap: 4px;
    }

    .wof-rating-button {
      min-height: 38px;
      font-size: 12px;
    }
  }
</style>

<div id="wof-experiment" data-condition="${e://Field/Condition}">
  <div class="wof-header">
    <div>
      <h2 class="wof-title">Wheel Task</h2>
      <p id="wof-condition-label">Loading condition...</p>
    </div>

    <div class="wof-stats">
      <div class="wof-stat">
        <div class="wof-stat-label">Trial</div>
        <div id="wof-trial-label" class="wof-stat-value">1/20</div>
      </div>
    </div>
  </div>

  <div class="wof-progress">
    <div id="wof-progress-bar"></div>
  </div>

  <div class="wof-main">
    <div class="wof-wheel-wrap">
      <div class="wof-wheel-stage">
        <div class="wof-pointer-wrap">
          <div class="wof-pointer" aria-hidden="true"></div>
        </div>
        <div id="wof-wheel" aria-label="Wheel">
          <div class="wof-wheel-hub"></div>
        </div>
      </div>
    </div>

    <div class="wof-controls">
      <div id="wof-assigned-wager">The system has assigned this spin.</div>

      <div id="wof-payoff-panel" aria-live="polite">
        <div class="wof-payoff-item">
          <span class="wof-payoff-label">Win</span>
          <span id="wof-payoff-win" class="wof-payoff-value">+5 tokens</span>
        </div>
        <div class="wof-payoff-item">
          <span class="wof-payoff-label">Loss</span>
          <span id="wof-payoff-loss" class="wof-payoff-value">-5 tokens</span>
        </div>
      </div>

      <div id="wof-bet-panel">
        <div class="wof-panel-title">Wager</div>
        <div id="wof-bet-buttons">
          <button type="button" data-bet="1" class="wof-bet-button">1</button>
          <button type="button" data-bet="5" class="wof-bet-button">5</button>
          <button type="button" data-bet="10" class="wof-bet-button">10</button>
        </div>
      </div>

      <button id="wof-spin-button" type="button">Spin</button>
      <div id="wof-status">Prepare for the first trial.</div>
    </div>
  </div>

  <div id="wof-modal">
    <div class="wof-modal-panel">
      <div id="wof-modal-title">Result</div>
      <div id="wof-modal-message"></div>
      <div id="wof-rating-buttons"></div>
      <div id="wof-scale-labels" class="wof-scale-labels">
        <div class="wof-scale-low">not lucky</div>
        <div class="wof-scale-high">extremely lucky</div>
      </div>
      <button id="wof-next-button" type="button" disabled>Next</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/MarcianoLab/wheel-of-fortune-luck@test1/script.js?v=5"></script>
